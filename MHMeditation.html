<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation Therapy | Herbal Harmony</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{background:linear-gradient(120deg,#eef7f0,#f7fbf8);color:#2f3e34}

header{
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('https://images.unsplash.com/photo-1506126613408-eca07ce68773');
background-size:cover;background-position:center;color:white;text-align:center;padding:100px 20px
}

header h1{font-size:3rem;margin-bottom:15px}
header p{max-width:700px;margin:auto}

.container{padding:60px 8%}

.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px
}

.card{
background:white;border-radius:14px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,0.1);cursor:pointer;transition:0.35s
}

.card:hover{transform:translateY(-8px)}

.card h3{color:#2f6f4f;margin-bottom:10px}

.details{
max-height:0;overflow:hidden;transition:max-height 0.5s ease;margin-top:10px
}

.details p{margin:6px 0}

.benefits{background:#f1f8f4;padding:10px;border-radius:8px;margin-top:10px}

footer{text-align:center;padding:20px;background:#2f6f4f;color:white;margin-top:50px}
</style>
</head>
<body>

<header>
<h1>Meditation Therapy</h1>
<p>Meditation is a powerful natural practice that helps calm the mind, reduce stress and improve mental clarity. Explore different meditation techniques and learn how to practice them.</p>
</header>

<div class="container">
<div class="grid" id="meditationGrid"></div>
</div>

<footer>
<p>Herbal Harmony • Meditation & Mental Wellness</p>
</footer>

<script>

const meditations=[
{
name:"Mindfulness Meditation",
how:["Sit comfortably in a quiet place","Focus on your breathing","Observe thoughts without judging","Bring attention back to breath"],
benefits:["Reduces stress","Improves awareness","Enhances emotional balance"]
},
{
name:"Breathing Meditation",
how:["Sit upright","Take slow deep breaths","Inhale through nose exhale through mouth","Focus only on breathing rhythm"],
benefits:["Calms nervous system","Reduces anxiety","Improves oxygen flow"]
},
{
name:"Guided Meditation",
how:["Listen to a guided meditation audio","Follow instructions of guide","Visualize relaxing scenes","Stay relaxed and focused"],
benefits:["Easy for beginners","Promotes relaxation","Improves mental clarity"]
},
{
name:"Mantra Meditation",
how:["Sit comfortably","Repeat a calming word or mantra","Focus on the sound vibration","Continue for 10–15 minutes"],
benefits:["Improves concentration","Calms mind","Reduces stress"]
},
{
name:"Body Scan Meditation",
how:["Lie down comfortably","Focus attention on each body part","Start from toes to head","Release tension while scanning"],
benefits:["Improves relaxation","Reduces physical tension","Enhances body awareness"]
},
{
name:"Loving Kindness Meditation",
how:["Sit quietly","Think positive wishes for yourself","Extend wishes to others","Repeat kind phrases"],
benefits:["Improves compassion","Enhances emotional wellbeing","Reduces anger"]
},
{
name:"Visualization Meditation",
how:["Close eyes","Imagine peaceful scenery","Focus on sensory details","Stay relaxed"],
benefits:["Boosts creativity","Reduces stress","Improves mood"]
},
{
name:"Walking Meditation",
how:["Walk slowly in a quiet place","Focus on each step","Notice body movement","Breathe calmly"],
benefits:["Improves focus","Combines movement and meditation","Boosts mood"]
},
{
name:"Zen Meditation",
how:["Sit cross‑legged","Keep spine straight","Focus on breathing","Observe thoughts quietly"],
benefits:["Improves discipline","Enhances mindfulness","Calms mind"]
},
{
name:"Transcendental Meditation",
how:["Sit comfortably","Repeat a personal mantra","Close eyes","Practice for 15–20 minutes"],
benefits:["Deep relaxation","Reduces stress","Improves mental clarity"]
},
{
name:"Sound Meditation",
how:["Sit quietly","Listen to calming sounds or bells","Focus on vibrations","Relax body and mind"],
benefits:["Enhances relaxation","Improves focus","Reduces anxiety"]
},
{
name:"Chakra Meditation",
how:["Sit comfortably","Focus on body energy centers","Visualize colors in each chakra","Breathe deeply"],
benefits:["Balances energy","Improves emotional health","Promotes inner peace"]
}
];

const grid=document.getElementById("meditationGrid");

meditations.forEach((m,i)=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${m.name}</h3>
<p>Click to explore technique</p>
<div class="details" id="d${i}">
<p><strong>How to Practice:</strong></p>
${m.how.map(step=>`<p>• ${step}</p>`).join("")}
<div class="benefits">
<p><strong>Benefits:</strong></p>
${m.benefits.map(b=>`<p>✔ ${b}</p>`).join("")}
</div>
</div>
`;

card.onclick=()=>{
const detail=document.getElementById("d"+i);

if(detail.style.maxHeight){
detail.style.maxHeight=null;
}else{
detail.style.maxHeight=detail.scrollHeight+"px";
}
};

grid.appendChild(card);

});

</script>

</body>
</html>
