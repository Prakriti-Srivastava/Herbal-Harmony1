 <div class="chat-container">
  <div class="chat-header"> AI Assistant</div>
  <div class="chat-box" id="chatBox"></div>  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div><script>
  function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    // Fake AI response (replace with API later)
    setTimeout(() => {
      const reply = getBotReply(message);
      addMessage(reply, "bot");
    }, 500);
  }

  function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function getBotReply(message) {
    message = message.toLowerCase();

    if (message.includes("hello")) return "Hey there! How can I help you?";
    if (message.includes("project")) return "Sounds interesting! Tell me more about your project.";
    if (message.includes("ai")) return "AI is awesome 😎 What do you want to build?";

    return "I am your AI assistant. I will be smarter once connected to backend!";
  }

  // Enter key support
  document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });
</script></body>
